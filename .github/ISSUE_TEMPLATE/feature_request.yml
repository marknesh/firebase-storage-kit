name: Feature request
description: Suggest an idea for firebase-storage-kit
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Describe the problem you're trying to solve and how you'd like the API to work.

        Breaking changes require a **major** changeset when implemented. See [CONTRIBUTING.md](../CONTRIBUTING.md).

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What problem does this solve? What are you trying to do?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like the API or behavior to work?
      render: ts
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about?
